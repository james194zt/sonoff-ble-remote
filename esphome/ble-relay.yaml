# Standalone ESPHome BLE relay (GitHub repo copy).
# HADashboard users: flash from HADashboard/esphome/ble-relay.yaml instead.

substitutions:
  devicename: ble-relay
  devicefriendlyname: BLE Relay

esphome:
  name: ${devicename}
  friendly_name: ${devicefriendlyname}
  compile_process_limit: 1

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

packages:
  sonoff_ble: !include sonoff_ble_receiver.yaml

api:
  homeassistant_services: true

ota:
  - platform: esphome
